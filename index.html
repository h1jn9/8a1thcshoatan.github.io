<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>SolarTracker</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="logo-box">
  <div class="logo-icon">A</div>
  <div class="logo-text">ABTC</div>
</div>

<!-- VIDEO NỀN -->
<video autoplay muted loop id="bg-video">
  <source src="background.mp4" type="video/mp4">
</video>

<section class="hero">

  <div class="content">
    <p class="tag">CLEAN ENERGY SOLUTION</p>

    <h1 class="title">
      Mô hình cảm biến <br>
      ánh sáng <span class="sun">mặt trời</span> <br>
      <span class="green">thông minh</span>
    </h1>

    <p class="desc">
      Hệ thống tự động xoay theo hướng ánh sáng để tối ưu hiệu suất năng lượng.
    </p>
  </div>

  <!-- KHUNG VIDEO -->
  <div class="video-box glass" onclick="openVideo()">

  <!-- chữ góc trái trên -->
  <div class="video-note">*video thuyết minh</div>

  <!-- chữ góc phải dưới -->
  <div class="video-info">THCS Hòa Tân / Lớp 8A1</div>

  <div class="play">▶</div>

</div>
</section>

<!-- POPUP VIDEO -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close" onclick="closeVideo()">✖</span>
    <video controls autoplay>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
