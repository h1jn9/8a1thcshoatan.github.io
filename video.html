<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Video Thuyết Minh</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background: radial-gradient(circle,#1a0025,#0a0014);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

/* title */
h1{
  font-size:40px;
}

span{
  color:#ff99cc;
  text-shadow:0 0 12px rgba(255,153,204,0.8);
}

/* video */
.video-box{
  margin-top:30px;
  width:80%;
  max-width:1000px;
  aspect-ratio:16/9;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 40px rgba(255,153,204,0.5);
}

iframe{
  width:100%;
  height:100%;
}

/* back */
.back{
  position:absolute;
  bottom:20px;
  left:20px;

  padding:8px 14px;
  border-radius:20px;

  color:#ff99cc;
  text-decoration:none;
  font-size:14px;

  background:rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.2);

  box-shadow:0 0 10px rgba(255,153,204,0.2);

  transition:0.3s;
}
.back:hover{
  text-shadow:0 0 10px #ff99cc;
}

/* 🔥 FOOTER FIX */
.footer{
  position:fixed;       /* luôn dính đáy màn hình */
  bottom:6px;           /* hạ xuống */
  left:0;
  width:100%;
  text-align:center;

  font-size:10px;       /* nhỏ lại */
  letter-spacing:1.5px;

  color:rgba(255,255,255,0.5);
}

.footer span{
  color:#ff99cc;
  text-shadow:0 0 6px rgba(255,153,204,0.6);
}
</style>

</head>

<body>

<h1>Video <span>Thuyết Minh</span></h1>

<div class="video-box">
  <iframe 
    src="https://www.youtube.com/embed/VIDEO_ID"
    frameborder="0"
    allowfullscreen>
  </iframe>
</div>

<a href="index.html" class="back">← Quay lại</a>

<footer class="footer">
  © 2026 ABTC • <span>TECH BLUE & NATURE GREEN</span>
</footer>

</body>
</html>
